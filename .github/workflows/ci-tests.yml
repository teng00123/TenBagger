name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 后端单元测试 ──────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx anyio

      - name: Copy env
        run: cp .env.example .env

      - name: Run unit tests
        run: |
          cd backend
          python3 -m pytest tests/ -v --tb=short \
            --junit-xml=../test-results/backend-junit.xml
        env:
          PYTHONPATH: backend

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: test-results/backend-junit.xml

      - name: Lint with flake8 (non-blocking)
        run: |
          pip install flake8 || true
          cd backend
          flake8 . --max-line-length=120 \
            --exclude=__pycache__,tests \
            --count --statistics || echo "⚠️ Lint 警告（非阻断）"

  # ── 前端构建检查 ──────────────────────────────────────────────────
  frontend-test:
    name: Frontend Build (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: |
          cd frontend
          npm run build
          echo "✅ 前端构建成功"

      - name: Run tests (if exist)
        run: |
          cd frontend
          if grep -q '"test"' package.json; then
            npm run test
          else
            echo "⚠️ 暂无前端测试脚本，跳过"
          fi

  # ── Docker 构建验证 ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [ backend-test, frontend-test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Build backend image
        run: docker build -t tenbagger-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t tenbagger-frontend:ci ./frontend

      - name: Write summary
        run: |
          echo "## ✅ CI 全部通过" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Unit Tests (66 cases) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ✅ |" >> $GITHUB_STEP_SUMMARY
