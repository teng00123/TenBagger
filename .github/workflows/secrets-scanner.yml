name: Secrets Scanner

on:
  push:
    branches: [ main ]

jobs:
  scan-secrets:
    name: Scan for Secrets & Sensitive Info
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # 用于上传 SARIF 报告（可选）

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，确保能扫描所有 commit

      # ── 工具1：gitleaks（主力扫描器）──────────────────────────────
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # 公开仓库无需此项
        continue-on-error: false  # 发现泄露时直接 fail

      # ── 工具2：truffleHog（深度扫描 git 历史）─────────────────────
      - name: Run TruffleHog (git history deep scan)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # PR 事件：扫描 PR base → head；push 事件：扫描 before → after
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}
          extra_args: --only-verified  # 只报告高置信度的真实泄露

      # ── 工具3：自定义正则扫描（补充覆盖内网/私有 token 格式）──────
      - name: Custom Pattern Scan
        run: |
          echo "🔍 开始自定义敏感信息扫描..."

          FOUND=0
          REPORT=""

          # 扫描当前所有文件（排除常见非代码目录）
          scan_files() {
            local pattern="$1"
            local label="$2"
            local result
            result=$(grep -rn --include="*.py" --include="*.js" --include="*.ts" \
              --include="*.java" --include="*.go" --include="*.env" \
              --include="*.yml" --include="*.yaml" --include="*.json" \
              --include="*.sh" --include="*.config" --include="*.conf" \
              --exclude-dir=".git" --exclude-dir="node_modules" \
              --exclude-dir=".venv" --exclude-dir="dist" --exclude-dir="build" \
              -E "$pattern" . 2>/dev/null || true)

            if [ -n "$result" ]; then
              FOUND=1
              echo ""
              echo "❌ [$label] 发现疑似敏感信息:"
              # 脱敏输出：只显示文件名和行号，隐藏实际值
              echo "$result" | sed 's/\(.\{0,30\}\)\(.\{8\}\)\(.\{0,999\}\)/\1[REDACTED]\3/' | head -20
              REPORT="$REPORT\n[$label]\n$result\n"
            fi
          }

          # AWS
          scan_files 'AKIA[0-9A-Z]{16}' "AWS Access Key"
          scan_files 'aws_secret_access_key\s*=\s*[A-Za-z0-9/+=]{40}' "AWS Secret Key"

          # GitHub Token
          scan_files 'ghp_[A-Za-z0-9]{36}' "GitHub Personal Access Token"
          scan_files 'github_pat_[A-Za-z0-9_]{82}' "GitHub Fine-grained Token"
          scan_files 'ghs_[A-Za-z0-9]{36}' "GitHub App Token"

          # Google
          scan_files 'AIza[0-9A-Za-z\-_]{35}' "Google API Key"
          scan_files 'ya29\.[0-9A-Za-z\-_]+' "Google OAuth Token"

          # Slack
          scan_files 'xox[baprs]-[0-9A-Za-z\-]{10,}' "Slack Token"

          # 通用高风险关键字（赋值形式）
          scan_files '(password|passwd|pwd|secret|api_key|apikey|access_token|auth_token|private_key)\s*[=:]\s*["\x27][^"\x27]{8,}["\x27]' "Hardcoded Credentials"

          # 私钥文件头
          scan_files '\-\-\-\-\-BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY\-\-\-\-\-' "Private Key"

          # 腾讯云 SecretId/SecretKey
          scan_files 'AKID[A-Za-z0-9]{32}' "Tencent Cloud SecretId"
          scan_files '(secret_?key|SecretKey)\s*[=:]\s*[A-Za-z0-9]{32,}' "Tencent Cloud SecretKey"

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ 发现敏感信息！请立即处理："
            echo "  1. 撤销并重新生成已泄露的密钥/Token"
            echo "  2. 从代码中删除硬编码的敏感信息"
            echo "  3. 使用环境变量或 GitHub Secrets 代替"
            echo "  4. 使用 git filter-repo 清除历史记录中的敏感信息"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          else
            echo "✅ 自定义扫描完成，未发现敏感信息"
          fi

      # ── 扫描 .env 文件是否被意外提交 ──────────────────────────────
      - name: Check for committed .env files
        run: |
          echo "🔍 检查是否有 .env 文件被提交..."

          ENV_FILES=$(find . -name "*.env" -o -name ".env" -o -name ".env.*" \
            ! -name ".env.example" ! -name ".env.sample" ! -name ".env.template" \
            ! -path "./.git/*" ! -path "./node_modules/*" 2>/dev/null || true)

          if [ -n "$ENV_FILES" ]; then
            echo "⚠️  警告：以下 .env 文件已被提交到仓库（可能包含敏感信息）："
            echo "$ENV_FILES"
            echo ""
            echo "建议将这些文件加入 .gitignore"
            # 警告但不 fail（可能是 .env.example 等模板文件）
          else
            echo "✅ 未发现意外提交的 .env 文件"
          fi

      # ── 汇总报告 ───────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## 🔒 Secrets 扫描结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 扫描工具 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | 见上方步骤 |" >> $GITHUB_STEP_SUMMARY
          echo "| TruffleHog | 见上方步骤 |" >> $GITHUB_STEP_SUMMARY
          echo "| 自定义正则扫描 | 见上方步骤 |" >> $GITHUB_STEP_SUMMARY
          echo "| .env 文件检查 | 见上方步骤 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📖 如发现泄露，请参考 [GitHub 密钥管理最佳实践](https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions)" >> $GITHUB_STEP_SUMMARY
