# Commit Message Format Check
# 规则: ^(feat|fix|perf|refactor|docs|test|style|chore)(\(.+\))?: .{1,100} #\d+$
# 示例: feat(backend): add RSI strategy endpoint #12
#
# 仅在 pull_request 事件触发，避免直接 push 到 main 时误报
# (main 分支应通过 branch protection 强制要求 PR)

name: Commit Message Check

on:
  pull_request:
    branches: [ main ]

jobs:
  check-commit-message:
    name: Check Commit Message
    runs-on: ubuntu-latest
    steps:
      - name: Check Commit Message
        uses: gsactions/commit-message-checker@v2
        with:
          pattern: '^(feat|fix|perf|refactor|docs|test|style|chore)(\(.+\))?: .{1,100} #\d+$'
          error: 'Commit message 格式不正确。正确格式: feat(scope): description #issue_number'
          excludeDescription: 'true'
          excludeTitle: 'true'
          checkAllCommitMessages: 'true'
          accessToken: ${{ secrets.GITHUB_TOKEN }}

